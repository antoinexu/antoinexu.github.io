<header class="header">

        <option value="en">English</option>

<section class="case-study" id="case-study">
    <div class="case-study-content">
        <a href="project.html" class="case-study-back" id="cs-back">Back to Projects</a>
        <h1 id="cs-title"></h1>
        <p class="case-study-disclaimer" id="cs-disclaimer"></p>
        <div id="cs-body"></div>
    </div>
</section>

<script src="i18n.js"></script>
<script src="architecture.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        function el(tag, text) {
            const node = document.createElement(tag);
            if (text !== undefined) node.textContent = text;
            return node;
        }

        function renderBody(sections) {
            const body = document.getElementById('cs-body');
            body.innerHTML = '';

            sections.forEach(section => {
                const wrap = el('div');
                wrap.className = 'cs-section';
                wrap.appendChild(el('h2', section.heading));

                (section.paragraphs || []).forEach(p => wrap.appendChild(el('p', p)));

                if (section.architecture && window.buildArchitectureSVG) {
                    const fig = el('div');
                    fig.className = 'arch-figure';
                    fig.appendChild(window.buildArchitectureSVG(section.architecture));
                    wrap.appendChild(fig);
                } else if (section.code) {
                    const pre = el('pre');
                    pre.appendChild(el('code', section.code));
                    wrap.appendChild(pre);
                }

                (section.paragraphs_after || []).forEach(p => wrap.appendChild(el('p', p)));

                if (section.list) {
                    const ul = el('ul');
                    section.list.forEach(item => ul.appendChild(el('li', item)));
                    wrap.appendChild(ul);
                }

                (section.subsections || []).forEach(sub => {
                    wrap.appendChild(el('h3', sub.title));
                    wrap.appendChild(el('p', sub.body));
                });

                body.appendChild(wrap);
            });
        }

        function changeLanguage(lang) {
            fetch('translations_case_study_erp.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to load translations.');
                    }
                    return response.json();
                })
                .then(data => {
                    const t = data[lang];
                    translateNav(t);
                    setDocumentLanguage(lang);

                    document.getElementById('cs-back').textContent = t.back;
                    document.getElementById('cs-title').textContent = t.title;
                    document.getElementById('cs-disclaimer').textContent = t.disclaimer;
                    renderBody(t.sections);
                })
                .catch(error => {
                    console.error('Error loading translations:', error);
                });
        }

        setupLanguageSelector(changeLanguage);
    });
</script>

<script src="animations.js"></script>
</body>
</html>
