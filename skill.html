<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Skills - Bowei Xu</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

<header class="header">
    <a href="index.html" class="logo">Portfolio</a>

    <i class="bx bx-menu" id="menu-icon"></i>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="experience.html">Experiences</a>
        <a href="contact.html">Contact</a>
        <a href="skill.html" class="active">Skills</a>
        <a href="project.html">Projects</a>
        <a href="service.html">Services</a>
    </nav>

    <select id="language-selector" class="language-selector">
        <option value="en">English</option>
        <option value="zh">中文</option>
    </select>
</header>

<section class="skills" id="skills">
    <div class="skills-content">
        <h2>My Skills</h2>
        <div class="skills-icons">
            <span class="skill-icon"><i class='bx bxl-html5'></i><span>HTML5</span></span>
            <span class="skill-icon"><i class='bx bxl-css3'></i><span>CSS3</span></span>
            <span class="skill-icon"><i class='bx bxl-javascript'></i><span>JavaScript</span></span>
            <span class="skill-icon"><i class='bx bxl-php'></i><span>PHP</span></span>
            <span class="skill-icon"><i class='bx bxl-java'></i><span>Java</span></span>
            <span class="skill-icon"><i class='bx bxl-python'></i><span>Python</span></span>
            <span class="skill-icon"><i class='bx bxs-data'></i><span>Microsoft SQL Server</span></span>
            <span class="skill-icon"><i class='bx bxs-data'></i><span>MySQL</span></span>
            <span class="skill-icon"><i class='bx bx-server'></i><span>Node.js</span></span>
            <span class="skill-icon"><i class='bx bx-code-curly'></i><span>Express.js</span></span>
            <span class="skill-icon"><i class='bx bxl-react'></i><span>React.js</span></span>
            <span class="skill-icon"><i class='bx bxl-git'></i><span>Git</span></span>
            <span class="skill-icon"><i class='bx bxl-aws'></i><span>AWS</span></span>
            <span class="skill-icon"><i class='bx bxl-microsoft'></i><span>Azure</span></span>
            <span class="skill-icon"><i class='bx bx-terminal'></i><span>Linux</span></span>
            <span class="skill-icon"><i class='bx bxl-docker'></i><span>Docker</span></span>
            <span class="skill-icon"><i class='bx bx-cart'></i><span>OpenCart</span></span>
            <span class="skill-icon"><i class='bx bx-network-chart'></i><span>ERP System</span></span>
            <a href="https://www.usgo.org/content.aspx?page_id=22&club_id=454497&module_id=550340" class="skill-icon">
                <i class='bx bx-brain'></i>
                <span>Go - AGA ID: 30045</span>
            </a>
        </div>
    </div>
</section>

<script src="animations.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        function changeLanguage(lang) {
            fetch('translations_skill.json')
                .then(response => response.json())
                .then(data => {
                    document.querySelector('.navbar a[href="index.html"]').textContent = data[lang].home;
                    document.querySelector('.navbar a[href="experience.html"]').textContent = data[lang].experiences;
                    document.querySelector('.navbar a[href="contact.html"]').textContent = data[lang].contact;
                    document.querySelector('.navbar a[href="skill.html"]').textContent = data[lang].skills;
                    document.querySelector('.navbar a[href="project.html"]').textContent = data[lang].projects;
                    document.querySelector('.navbar a[href="service.html"]').textContent = data[lang].services;
                });
        }

        document.getElementById('language-selector').addEventListener('change', function(e) {
            changeLanguage(this.value);
            localStorage.setItem('selectedLanguage', this.value);
        });

        const storedLanguage = localStorage.getItem('selectedLanguage');
        if (storedLanguage) {
            document.getElementById('language-selector').value = storedLanguage;
            changeLanguage(storedLanguage);
        }
    });
</script>
</body>
</html>
